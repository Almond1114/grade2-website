<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キャッシュ更新 | 2Base</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#f8fafc;color:#0f172a;padding:24px}
    main{max-width:520px;background:#fff;border:1px solid #e5e7eb;border-radius:28px;padding:26px;box-shadow:0 20px 60px rgba(15,23,42,.12)}
    h1{margin:0 0 10px;font-size:28px}.btn{display:inline-flex;margin-top:18px;padding:12px 16px;border-radius:999px;background:#2563eb;color:white;text-decoration:none;font-weight:800}p{line-height:1.7}.log{font-size:13px;color:#64748b;white-space:pre-wrap}
  </style>
</head>
<body>
  <main>
    <h1>2Baseを更新中...</h1>
    <p>スマホに残った古い設定を消して、最新の編集画面を開きます。</p>
    <p class="log" id="log">開始中...</p>
    <a class="btn" href="edit.html?v=mobile-cache-reset">編集画面を開く</a>
  </main>
  <script>
    const log = document.getElementById('log');
    function add(text){ log.textContent += '\n' + text; }
    (async function(){
      try {
        localStorage.removeItem('grade2DataCache');
        Object.keys(localStorage).forEach(key => {
          if (key.startsWith('grade2DataCache:')) localStorage.removeItem(key);
        });
        add('localStorageを更新しました');
      } catch(e) { add('localStorage更新をスキップ'); }
      try {
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(key => caches.delete(key)));
          add('キャッシュを削除しました');
        }
      } catch(e) { add('キャッシュ削除をスキップ'); }
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(reg => reg.unregister()));
          add('Service Workerを解除しました');
        }
      } catch(e) { add('Service Worker解除をスキップ'); }
      add('2秒後に編集画面へ移動します');
      setTimeout(() => location.replace('edit.html?v=mobile-cache-reset-' + Date.now()), 2000);
    })();
  </script>
</body>
</html>
